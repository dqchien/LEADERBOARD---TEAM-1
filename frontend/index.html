<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏆 Live Leaderboard</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ─── HEADER ────────────────────────────────────────────────────────────── -->
    <header class="header">
        <div class="header-left">
            <h1>🏆 <span>Live</span> Leaderboard</h1>
            <div class="live-badge">
                <span class="live-dot"></span>
                LIVE
            </div>
        </div>
        <div class="ws-status">
            <span class="ws-dot disconnected" id="ws-dot"></span>
            <span id="ws-label">Đang kết nối...</span>
        </div>
    </header>

    <!-- ─── MAIN ──────────────────────────────────────────────────────────────── -->
    <main class="container">

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">--</div>
                <div class="stat-label">Tổng người chơi</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-updates">0</div>
                <div class="stat-label">Updates phiên này</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-connections">1 tab</div> <!-- FIX: đổi từ "1" -->
                <div class="stat-label">Kết nối WS</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn btn-primary" id="btn-simulate">
                ⚡ Tự động giả lập nạp điểm
            </button>
            <button class="btn btn-danger" id="btn-stop" style="display:none">
                ⏹ Dừng
            </button>
            <button class="btn btn-outline" id="btn-refresh">
                🔄 Làm mới
            </button>
            <div class="sim-progress" id="sim-progress">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <span id="progress-text">0 / 2000</span>
            </div>
        </div>

        <!-- Leaderboard -->
        <div class="lb-card">
            <div class="lb-header">
                <span>Hạng</span>
                <span>Người chơi</span>
                <span style="text-align:right">Điểm</span>
            </div>
            <div class="lb-body" id="lb-body">
                <div class="spinner"></div>
            </div>
        </div>

    </main>

    <!-- ─── PINNED BAR ─────────────────────────────────────────────────────────── -->
    <div class="pinned-bar">
        <div class="pinned-label">📍 Thứ hạng của bạn</div>
        <div class="pinned-inner">
            <div class="pinned-rank-badge" id="pinned-rank">--</div>
            <div class="user-info">
                <div class="avatar" style="background:linear-gradient(135deg,#6c63ff,#00e5ff)">B</div>
                <div>
                    <div class="user-name" id="pinned-name">Bạn (demo_user)</div>
                    <div class="user-id">demo_user</div>
                </div>
            </div>
            <div class="score-col">
                <div class="pinned-score" id="pinned-score">0</div>
            </div>
        </div>
    </div>

    <!-- ─── TOAST ──────────────────────────────────────────────────────────────── -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
